events {}

stream {
    map $ssl_preread_server_name $backend {
        FAKE_TLS_DOMAIN  mtproto:2443;
        default          127.0.0.1:8443;
    }
    server {
        listen      443;
        ssl_preread on;
        proxy_pass  $backend;
    }
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 8443 ssl;
        http2  on;
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        server_tokens off;
        port_in_redirect  off;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        root  /usr/share/nginx/html;
        index index.html;

        location /panel/ {
            auth_request     /auth-check;
            error_page 401 = @login_redirect;
            alias /usr/share/nginx/html/panel/;
            try_files $uri $uri/ /panel/index.html;
        }

        location = /auth-check {
            internal;
            proxy_pass              http://meridian-backend:8000/api/v1/auth/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        location @login_redirect { return 302 /; }

        location /api/ {
            proxy_pass         http://meridian-backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
