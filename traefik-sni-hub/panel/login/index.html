<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  background: #0a0c10;
  color: #b0b8c4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

.center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.card {
  width: 100%;
  max-width: 380px;
  background: #0f1118;
  border: 1px solid #1a1e28;
  border-radius: 10px;
  padding: 36px 32px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity .4s ease .15s, transform .4s ease .15s;
}
.card.ready { opacity: 1; transform: translateY(0); }

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
}
.brand-name {
  font-size: 17px;
  font-weight: 600;
  color: #e2e8f0;
  letter-spacing: -0.3px;
}
.tagline {
  font-size: 13px;
  color: #4a5568;
  margin-bottom: 28px;
}

.alert {
  padding: 9px 12px;
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.5;
  margin-bottom: 16px;
  display: none;
}
.alert-err  { background: rgba(239,68,68,.06); border: 1px solid rgba(239,68,68,.15); color: #ef4444; }
.alert-warn { background: rgba(245,158,11,.06); border: 1px solid rgba(245,158,11,.15); color: #f59e0b; }

.fg { margin-bottom: 14px; }
.fg label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: #64748b;
  margin-bottom: 5px;
}
.fg input {
  width: 100%;
  padding: 9px 11px;
  background: #0a0c10;
  border: 1px solid #1e2330;
  border-radius: 6px;
  color: #e2e8f0;
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
  outline: none;
  transition: border-color .15s;
}
.fg input:focus    { border-color: #2563eb; }
.fg input:disabled { opacity: .4; }
.fg input::placeholder { color: #2a3040; }

.row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
  font-size: 13px;
  color: #64748b;
  cursor: pointer;
  user-select: none;
}
.row input[type=checkbox] { accent-color: #2563eb; width: 14px; height: 14px; }

.btn {
  width: 100%;
  height: 40px;
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background .15s;
}
.btn:hover    { background: #1d4ed8; }
.btn.locked   { background: #161a24; color: #4a5568; cursor: not-allowed; }
.btn:disabled { cursor: not-allowed; }

.spinner {
  width: 15px; height: 15px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ft {
  padding: 10px 20px;
  border-top: 1px solid #161a24;
  text-align: center;
  font-size: 11px;
  color: #1e2330;
  opacity: 0;
  transition: opacity .5s ease .3s;
}
.ft.ready { opacity: 1; }
</style>
</head>
<body>

<div class="center">
  <div class="card" id="card">

    <div class="brand">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="6" fill="#0ea5e9"/>
        <text x="14" y="20" text-anchor="middle" font-size="17" font-weight="700" font-family="system-ui, sans-serif" fill="white">M</text>
      </svg>
      <span class="brand-name">Meridian</span>
    </div>
    <div class="tagline">Authentication required</div>

    <div class="alert alert-err"  id="err"></div>
    <div class="alert alert-warn" id="warn"></div>

    <form id="f">
      <div class="fg">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="fg">
        <label for="pw">Password</label>
        <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <label class="row">
        <input type="checkbox" name="remember"> Keep me signed in
      </label>
      <button class="btn" type="submit" id="btn">Sign in</button>
    </form>

  </div>
</div>

<div class="ft" id="ft">&copy; 2026 Meridian Systems</div>

<script>
(function () {
  var card = document.getElementById('card');
  var ft   = document.getElementById('ft');
  var f    = document.getElementById('f');
  var btn  = document.getElementById('btn');
  var err  = document.getElementById('err');
  var warn = document.getElementById('warn');

  requestAnimationFrame(function () {
    card.classList.add('ready');
    ft.classList.add('ready');
  });

  f.addEventListener('submit', function (e) {
    e.preventDefault();
    if (btn.disabled) return;

    err.style.display  = 'none';
    warn.style.display = 'none';
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';

    fetch('/api/v1/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('pw').value,
        remember: f.remember.checked
      })
    })
    .then(function (r) {
      return r.json().then(function (d) { return { status: r.status, data: d }; });
    })
    .then(function (r) {
      if (r.status === 200) {
        window.location.href = '/panel/';
        return;
      }
      document.getElementById('pw').value = '';
      var msg = (typeof r.data.detail === 'string' ? r.data.detail : null) || 'Authentication failed.';
      if (r.status === 429) {
        warn.textContent   = msg;
        warn.style.display = 'block';
        btn.classList.add('locked');
        btn.textContent = 'Locked';
      } else {
        err.textContent   = msg;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    })
    .catch(function () {
      err.textContent   = 'Service unavailable.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  });
})();
</script>
</body>
</html>
